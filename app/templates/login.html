{% extends 'base.html' %}
{% block title %}Login - CollabHub{% endblock %}

{% block auth_content %}
<div class="auth-card">
  <div class="auth-logo">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="5" cy="6" r="2"/>
      <circle cx="19" cy="6" r="2"/>
      <circle cx="5" cy="18" r="2"/>
      <circle cx="19" cy="18" r="2"/>
      <line x1="9.5" y1="10.5" x2="6.5" y2="7.5"/>
      <line x1="14.5" y1="10.5" x2="17.5" y2="7.5"/>
      <line x1="9.5" y1="13.5" x2="6.5" y2="16.5"/>
      <line x1="14.5" y1="13.5" x2="17.5" y2="16.5"/>
    </svg>
    CollabHub
  </div>

  <h2 style="text-align:center;margin-bottom:8px">Welcome back</h2>
  <p style="text-align:center;color:var(--text-secondary);margin-bottom:24px">Sign in to your account</p>

  {% if error %}
  <div class="alert alert-error">
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="POST" action="/login" id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" name="email" required placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
    </div>

    <button type="submit" class="btn btn-primary" id="loginSubmit" style="width:100%;justify-content:center;margin-top:8px">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Sign In
    </button>
  </form>

  <p style="text-align:center;margin-top:20px;color:var(--text-secondary);font-size:0.875rem">
    Don't have an account? <a href="/signup" style="color:var(--primary);font-weight:500">Sign up</a>
  </p>
</div>
{% endblock %}
