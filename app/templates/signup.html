{% extends 'base.html' %}
{% block title %}Sign Up - CollabHub{% endblock %}

{% block auth_content %}
<div class="auth-card">
  <div class="auth-logo">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="5" cy="6" r="2"/>
      <circle cx="19" cy="6" r="2"/>
      <circle cx="5" cy="18" r="2"/>
      <circle cx="19" cy="18" r="2"/>
      <line x1="9.5" y1="10.5" x2="6.5" y2="7.5"/>
      <line x1="14.5" y1="10.5" x2="17.5" y2="7.5"/>
      <line x1="9.5" y1="13.5" x2="6.5" y2="16.5"/>
      <line x1="14.5" y1="13.5" x2="17.5" y2="16.5"/>
    </svg>
    CollabHub
  </div>

  <h2 style="text-align:center;margin-bottom:8px">Create your account</h2>
  <p style="text-align:center;color:var(--text-secondary);margin-bottom:24px">Get started with CollabHub today</p>

  {% if error %}
  <div class="alert alert-error">
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="POST" action="/signup" id="signupForm">
    <div class="form-group">
      <label class="form-label" for="name">Full Name</label>
      <input class="form-input" type="text" id="name" name="name" required placeholder="John Doe" autocomplete="name">
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" name="email" required placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••" autocomplete="new-password" minlength="6">
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm Password</label>
      <input class="form-input" type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" autocomplete="new-password">
    </div>

    <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:12px;margin-bottom:12px">
      <input type="checkbox" id="is_ceo" name="is_ceo" value="true" style="width:auto">
      <label for="is_ceo" style="margin-bottom:0;cursor:pointer;color:var(--text-secondary)">Register as Organization CEO</label>
    </div>

    <button type="submit" class="btn btn-primary" id="signupSubmit" style="width:100%;justify-content:center;margin-top:8px">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      Create Account
    </button>
  </form>

  <p style="text-align:center;margin-top:20px;color:var(--text-secondary);font-size:0.875rem">
    Already have an account? <a href="/login" style="color:var(--primary);font-weight:500">Sign in</a>
  </p>
</div>
{% endblock %}
